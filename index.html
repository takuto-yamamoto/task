<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FDFBF7;
    --sage:#7FB069;
    --sage-dark:#5E9A4C;
    --sage-soft:#A9D696;
    --sage-pale:#E3E9DC;
    --charcoal:#333333;
    --mute:rgba(51,51,51,0.45);
    --line:rgba(51,51,51,0.10);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--ivory);
    color:var(--charcoal);
    font-family:"M PLUS Rounded 1c", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{ position:fixed; inset:0; height:100dvh; overflow:hidden; }
  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ---------- Main screen ---------- */
  #bubbleField{
    position:fixed; inset:0; z-index:1; overflow:hidden; touch-action:none;
  }

  .card-stack{
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    width:min(84vw,320px);
    display:flex; flex-direction:column; align-items:center; gap:12px;
    transition:top .28s ease;
  }
  .card-stack.kb-active{ top:26%; }

  /* ---- お気に入り（ルーティン）チップ ---- */
  .favorite-section{
    display:flex; flex-direction:column; align-items:center; gap:5px;
    width:100%;
  }
  .favorite-section.empty{ display:none; }
  .favorite-chips{
    display:flex; gap:8px; width:100%; overflow-x:auto;
    padding:2px 2px 6px; touch-action:pan-x; scrollbar-width:none;
  }
  .favorite-chips::-webkit-scrollbar{ display:none; }
  .fav-chip{
    flex:0 0 auto; display:flex; align-items:baseline; gap:6px;
    border:1px solid rgba(127,176,105,.40);
    background:rgba(127,176,105,.14);
    border-radius:999px; padding:9px 16px;
    font-family:inherit; color:var(--charcoal); font-size:13px;
    white-space:nowrap; -webkit-user-select:none; user-select:none;
  }
  .fav-chip:active{ background:rgba(127,176,105,.30); }
  .fav-chip-time{ font-size:11px; color:var(--mute); }
  .fav-hint{ font-size:10px; color:var(--mute); letter-spacing:.02em; }

  .input-card{
    position:relative;
    width:100%;
    background:rgba(253,251,247,0.93);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-radius:28px;
    padding:30px 24px 26px;
    box-shadow:0 10px 30px rgba(51,51,51,0.08);
    display:flex; flex-direction:column; align-items:center; gap:18px;
  }

  #favToggleBtn{
    position:absolute; top:10px; right:10px;
    width:32px; height:32px; border:none; border-radius:50%;
    background:transparent; display:flex; align-items:center; justify-content:center;
    color:var(--mute); transition:color .2s, transform .15s;
  }
  #favToggleBtn:active{ transform:scale(.86); }
  #favToggleBtn.active{ color:var(--sage-dark); }
  #favToggleBtn.active path{ fill:currentColor; }

  #textInput{
    width:100%; height:52px;
    border:none; border-bottom:2px solid var(--sage-soft);
    background:transparent;
    font-family:inherit; font-size:16px; color:var(--charcoal);
    text-align:center; outline:none; padding:0 6px;
    transition:border-color .2s;
  }
  #textInput:focus{ border-color:var(--sage); }
  #textInput::placeholder{ color:var(--mute); }

  .preview-wrap{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .preview-hint{ font-size:11px; color:var(--mute); letter-spacing:.02em; }

  #okBtn{
    min-width:128px; height:52px; border:none; border-radius:26px;
    background:var(--sage); color:#fff; font-family:inherit;
    font-size:16px; font-weight:700; letter-spacing:.06em;
    box-shadow:0 4px 14px rgba(51,51,51,.18);
  }
  #okBtn:active{ background:var(--sage-dark); transform:translateY(1px); }

  #logIconBtn{
    position:fixed; right:10px; bottom:max(10px, env(safe-area-inset-bottom));
    width:48px; height:48px; border:none; border-radius:50%;
    background:transparent; display:flex; align-items:center; justify-content:center;
    color:var(--charcoal); opacity:.16; z-index:6; transition:opacity .2s;
  }
  #logIconBtn:active{ opacity:.5; }

  /* ---------- Bubbles ---------- */
  .bubble{
    position:absolute; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.45) 0%, rgba(127,176,105,.92) 42%, rgba(127,176,105,.97) 100%);
    box-shadow:inset 0 0 10px rgba(255,255,255,.3), 0 4px 10px rgba(51,51,51,.10);
    color:#2F3A26; user-select:none; -webkit-user-select:none;
    touch-action:none; cursor:pointer;
    animation:bubbleAppear .42s cubic-bezier(.34,1.56,.64,1) both,
              floatBubble var(--dur,8s) ease-in-out var(--delay,0s) infinite;
  }
  .bubble.popping{ animation:popOut .35s ease-out forwards !important; }
  .bubble.preview-bubble{
    position:relative; animation:none; width:84px; height:84px;
  }
  .bubble-text{
    font-size:13px; font-weight:500; max-width:82%; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 4px;
    line-height:1.25;
  }
  .bubble-time{ font-size:10px; opacity:.78; margin-top:3px; font-weight:500; }

  @keyframes bubbleAppear{
    0%{ transform:scale(.2); opacity:0; }
    70%{ transform:scale(1.08); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  @keyframes popOut{
    0%{ transform:scale(1); opacity:1; }
    40%{ transform:scale(1.28); opacity:.75; }
    100%{ transform:scale(.15); opacity:0; }
  }
  @keyframes floatBubble{
    0%,100%{ transform:translate(0,0) rotate(0deg); }
    25%{ transform:translate(var(--dx1,0),var(--dy1,0)) rotate(var(--r1,0deg)); }
    50%{ transform:translate(var(--dx2,0),var(--dy2,0)) rotate(0deg); }
    75%{ transform:translate(var(--dx3,0),var(--dy3,0)) rotate(var(--r2,0deg)); }
  }

  /* ---------- Log screen ---------- */
  #logScreen{
    position:fixed; inset:0; background:var(--ivory); z-index:20;
    flex-direction:column;
  }
  #logScreen.active{ display:flex; }

  .log-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 12px; padding-top:max(14px, env(safe-area-inset-top));
    border-bottom:1px solid var(--line); flex:0 0 auto;
  }
  .log-header h2{ font-size:15px; font-weight:700; margin:0; letter-spacing:.03em; }
  #backBtn{
    min-height:44px; min-width:44px; border:none; background:transparent;
    color:var(--sage-dark); font-family:inherit; font-size:20px;
  }
  #csvBtn{
    min-height:44px; border:none; border-radius:20px; background:var(--sage);
    color:#fff; font-family:inherit; font-size:13px; font-weight:700; padding:0 16px;
  }
  #csvBtn:active{ background:var(--sage-dark); }

  #logList{
    flex:1 1 auto; overflow-y:auto; touch-action:pan-y;
    padding:8px 16px 24px;
  }
  .log-date-header{
    font-size:12px; color:var(--mute); font-weight:700;
    margin:18px 0 8px; letter-spacing:.04em;
  }
  .log-row{
    display:flex; align-items:center; gap:10px;
    padding:12px 4px; border-bottom:1px solid var(--line);
  }
  .log-time{ font-size:12px; color:var(--mute); width:42px; flex:0 0 auto; }
  .log-badge{
    font-size:11px; font-weight:700; color:var(--sage-dark);
    background:rgba(127,176,105,.20); border-radius:10px; padding:3px 8px;
    flex:0 0 auto; white-space:nowrap;
  }
  .log-text{ font-size:14px; flex:1 1 auto; word-break:break-word; }
  .log-auto{ font-size:10px; color:var(--mute); flex:0 0 auto; }
  .empty-log{
    text-align:center; color:var(--mute); font-size:13px; margin-top:60px;
  }
</style>
</head>
<body>
<div id="app">

  <div id="mainScreen" class="screen active">
    <div id="bubbleField"></div>

    <div class="card-stack" id="cardStack">
      <div class="favorite-section empty" id="favoriteSection">
        <div class="favorite-chips" id="favoriteChips"></div>
        <div class="fav-hint">長押しで削除</div>
      </div>

      <div class="input-card" id="inputCard">
        <button id="favToggleBtn" type="button" aria-label="ルーティンとして登録" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M12 2.5l2.9 6.6 7.1.6-5.4 4.7 1.7 7-6.3-3.9-6.3 3.9 1.7-7-5.4-4.7 7.1-.6z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
        <input id="textInput" type="text" maxlength="20" placeholder="やりたいことを入力" autocomplete="off">
        <div class="preview-wrap">
          <div class="bubble preview-bubble" id="previewBubble">
            <div class="bubble-text" id="previewText">&nbsp;</div>
            <div class="bubble-time" id="previewTime">1h</div>
          </div>
          <div class="preview-hint">2本指でつまんで時間を調整</div>
        </div>
        <button id="okBtn">OK</button>
      </div>
    </div>

    <button id="logIconBtn" aria-label="過去のログ">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="14" y2="18"/>
      </svg>
    </button>
  </div>

  <div id="logScreen" class="screen">
    <div class="log-header">
      <button id="backBtn" aria-label="戻る">←</button>
      <h2>過去ログ</h2>
      <button id="csvBtn">CSVダウンロード</button>
    </div>
    <div id="logList"></div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ===================== 定数 ===================== */
  var TIME_STEPS = [
    {minutes:5,   label:"5m"},
    {minutes:10,  label:"10m"},
    {minutes:15,  label:"15m"},
    {minutes:20,  label:"20m"},
    {minutes:30,  label:"30m"},
    {minutes:45,  label:"45m"},
    {minutes:60,  label:"1h"},
    {minutes:90,  label:"1.5h"},
    {minutes:120, label:"2h"},
    {minutes:180, label:"3h"},
    {minutes:240, label:"4h"},
    {minutes:360, label:"6h"},
    {minutes:480, label:"8h"},
    {minutes:720, label:"12h"},
    {minutes:1440,label:"24h"}
  ];
  var DEFAULT_STEP_INDEX = 6; /* 1h */
  var STORAGE_KEY = "awakeBubbleApp_v1";
  var PINCH_SENSITIVITY = 26; /* px per step */

  /* ---- 「画面いっぱい＝24時間」の見た目を作るための定数 ---- */
  var DAY_MINUTES = 1440;        /* 24時間 */
  var FILL_FACTOR = 0.78;        /* 円形の泡同士の隙間を考慮した充填率 */
  var MIN_BUBBLE_SIZE = 64;      /* px: どんなに短時間でも視認・タップできる最小サイズ */
  var MAX_BUBBLE_RATIO = 0.92;   /* px: 画面の短辺に対する泡の最大サイズ比（画面外に出ないように） */
  var PREVIEW_MAX_SIZE = 120;    /* px: 入力カード内プレビューの最大サイズ */
  var PREVIEW_MIN_SIZE = 52;     /* px: 入力カード内プレビューの最小サイズ */

  /* ===================== ユーティリティ ===================== */
  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function rand(min,max){ return Math.random()*(max-min)+min; }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function uid(){ return "b_" + Date.now() + "_" + Math.random().toString(36).slice(2,8); }
  function escapeHtml(s){
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }
  /* 泡の大きさ＝その「やりたいこと」が24時間のうち何割を占めるか、を面積で表現する。
     浮いている泡をすべて足すと24時間になるとき、面積の合計が画面いっぱいに近づく。 */
  function getFieldRect(){
    var rect = bubbleField.getBoundingClientRect();
    return { area: Math.max(rect.width * rect.height, 1), w: rect.width, h: rect.height };
  }
  function sizeForMinutes(minutes, rectInfo){
    var r = rectInfo || getFieldRect();
    var dayArea = r.area * FILL_FACTOR;
    var area = dayArea * (minutes / DAY_MINUTES);
    var diameter = 2 * Math.sqrt(area / Math.PI);
    var maxAllowed = Math.min(r.w, r.h) * MAX_BUBBLE_RATIO;
    return clamp(Math.round(diameter), MIN_BUBBLE_SIZE, Math.round(maxAllowed));
  }
  function sizeForStep(idx){ return sizeForMinutes(TIME_STEPS[idx].minutes); }
  /* 入力カード内のプレビューは専用の小さな基準スケールで計算（カードに収まるように） */
  function previewSizeForStep(idx){
    var minutes = TIME_STEPS[idx].minutes;
    var area = (PREVIEW_MAX_SIZE * PREVIEW_MAX_SIZE) * FILL_FACTOR * (minutes / DAY_MINUTES);
    var diameter = 2 * Math.sqrt(area / Math.PI);
    return clamp(Math.round(diameter), PREVIEW_MIN_SIZE, PREVIEW_MAX_SIZE);
  }

  function getLogicalDateStr(date){
    var d = date ? new Date(date) : new Date();
    if (d.getHours() < 3) d.setDate(d.getDate() - 1);
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  }
  function formatDateTime(ts){
    var d = new Date(ts);
    return d.getFullYear() + "/" + pad(d.getMonth()+1) + "/" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  /* ===================== 状態管理 ===================== */
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw){
        var parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.bubbles) && Array.isArray(parsed.logs)){
          if (typeof parsed.lastResetDate !== "string") parsed.lastResetDate = getLogicalDateStr();
          if (!Array.isArray(parsed.favorites)) parsed.favorites = [];
          return parsed;
        }
      }
    }catch(e){ console.warn("load failed", e); }
    return { bubbles: [], logs: [], favorites: [], lastResetDate: getLogicalDateStr() };
  }
  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn("save failed", e); }
  }

  var state = loadState();

  function toLogEntry(bubble, archivedAt, autoCleared){
    return {
      id: bubble.id,
      text: bubble.text,
      timeLabel: TIME_STEPS[bubble.stepIndex].label,
      timeMinutes: TIME_STEPS[bubble.stepIndex].minutes,
      archivedAt: archivedAt,
      autoCleared: !!autoCleared
    };
  }

  /* ===================== 音響 (Web Audio API) ===================== */
  var audioCtx = null;
  function getAudioCtx(){
    if (!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended"){
      audioCtx.resume().catch(function(){});
    }
    return audioCtx;
  }

  /* 木のような静かな打鍵音「コツッ」 */
  function playTypeSound(){
    var ctx = getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime;
    var dur = 0.045;
    var bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i=0; i<bufferSize; i++){
      var decay = Math.pow(1 - i/bufferSize, 3);
      data[i] = (Math.random()*2 - 1) * decay;
    }
    var noise = ctx.createBufferSource();
    noise.buffer = buffer;

    var bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 1400 + Math.random()*400;
    bp.Q.value = 5.5;

    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.22, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

    noise.connect(bp).connect(gain).connect(ctx.destination);
    noise.start(now);
    noise.stop(now + dur);
  }

  /* 朝露が滴るような水滴音「ポツン」 */
  function playPopSound(){
    var ctx = getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime;

    var osc1 = ctx.createOscillator();
    osc1.type = "sine";
    osc1.frequency.setValueAtTime(1500, now);
    osc1.frequency.exponentialRampToValueAtTime(420, now + 0.17);
    var g1 = ctx.createGain();
    g1.gain.setValueAtTime(0.0001, now);
    g1.gain.exponentialRampToValueAtTime(0.32, now + 0.008);
    g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    osc1.connect(g1).connect(ctx.destination);
    osc1.start(now);
    osc1.stop(now + 0.24);

    var osc2 = ctx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.setValueAtTime(2300, now + 0.01);
    osc2.frequency.exponentialRampToValueAtTime(950, now + 0.1);
    var g2 = ctx.createGain();
    g2.gain.setValueAtTime(0.0001, now);
    g2.gain.exponentialRampToValueAtTime(0.12, now + 0.005);
    g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    osc2.connect(g2).connect(ctx.destination);
    osc2.start(now + 0.01);
    osc2.stop(now + 0.15);
  }

  /* ===================== DOM参照 ===================== */
  var mainScreen   = document.getElementById("mainScreen");
  var logScreen    = document.getElementById("logScreen");
  var bubbleField  = document.getElementById("bubbleField");
  var cardStack    = document.getElementById("cardStack");
  var favoriteSection = document.getElementById("favoriteSection");
  var favoriteChips   = document.getElementById("favoriteChips");
  var favToggleBtn = document.getElementById("favToggleBtn");
  var inputCard    = document.getElementById("inputCard");
  var textInput    = document.getElementById("textInput");
  var okBtn        = document.getElementById("okBtn");
  var previewBubbleEl = document.getElementById("previewBubble");
  var previewTextEl   = document.getElementById("previewText");
  var previewTimeEl   = document.getElementById("previewTime");
  var logIconBtn   = document.getElementById("logIconBtn");
  var backBtn      = document.getElementById("backBtn");
  var csvBtn       = document.getElementById("csvBtn");
  var logList      = document.getElementById("logList");

  /* ===================== ジェスチャー（タップ／ピンチ） ===================== */
  function attachBubbleGestures(el, dataObj, opts){
    var pointers = new Map();
    var startDist = 0;
    var startIndex = dataObj.stepIndex;
    var pinched = false;
    var downInfo = null;

    function dist(map){
      var pts = Array.from(map.values());
      var dx = pts[0].x - pts[1].x;
      var dy = pts[0].y - pts[1].y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    el.addEventListener("pointerdown", function(e){
      try{ el.setPointerCapture(e.pointerId); }catch(err){}
      pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
      if (pointers.size === 1){
        downInfo = {x:e.clientX, y:e.clientY, t:Date.now()};
        pinched = false;
      }
      if (pointers.size === 2){
        startDist = dist(pointers);
        startIndex = dataObj.stepIndex;
        pinched = true;
      }
    });

    el.addEventListener("pointermove", function(e){
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
      if (pointers.size === 2){
        var d = dist(pointers);
        var delta = d - startDist;
        var stepChange = Math.round(delta / PINCH_SENSITIVITY);
        var newIndex = clamp(startIndex + stepChange, 0, TIME_STEPS.length - 1);
        if (newIndex !== dataObj.stepIndex){
          dataObj.stepIndex = newIndex;
          if (opts.onTimeChange) opts.onTimeChange(dataObj);
        }
      }
    });

    function endPointer(e){
      if (!pointers.has(e.pointerId)){ return; }
      pointers.delete(e.pointerId);
      if (pointers.size === 0){
        if (!pinched && downInfo){
          var dx = e.clientX - downInfo.x;
          var dy = e.clientY - downInfo.y;
          var moved = Math.sqrt(dx*dx + dy*dy);
          var dt = Date.now() - downInfo.t;
          if (moved < 10 && dt < 600 && opts.onTap){
            opts.onTap();
          }
        } else if (pinched && opts.onGestureEnd){
          opts.onGestureEnd(dataObj);
        }
        downInfo = null;
        pinched = false;
      }
    }
    el.addEventListener("pointerup", endPointer);
    el.addEventListener("pointercancel", endPointer);
  }

  /* ===================== プレビュー泡（時間設定） ===================== */
  var previewData = { stepIndex: DEFAULT_STEP_INDEX, isFavorite: false };

  function updatePreviewDisplay(){
    var size = previewSizeForStep(previewData.stepIndex);
    previewBubbleEl.style.width = size + "px";
    previewBubbleEl.style.height = size + "px";
    previewTimeEl.textContent = TIME_STEPS[previewData.stepIndex].label;
  }
  updatePreviewDisplay();

  /* 入力中のタスクを「ルーティン」として登録するかどうかのスター切替 */
  function updateFavToggleUI(){
    favToggleBtn.classList.toggle("active", previewData.isFavorite);
    favToggleBtn.setAttribute("aria-pressed", previewData.isFavorite ? "true" : "false");
  }
  updateFavToggleUI();
  favToggleBtn.addEventListener("click", function(){
    previewData.isFavorite = !previewData.isFavorite;
    updateFavToggleUI();
  });

  attachBubbleGestures(previewBubbleEl, previewData, {
    onTap: function(){},
    onTimeChange: function(){ updatePreviewDisplay(); },
    onGestureEnd: function(){}
  });

  /* ===================== 泡フィールド ===================== */
  function randomPosition(size){
    var rect = bubbleField.getBoundingClientRect();
    var maxX = Math.max(rect.width - size, 0);
    var maxY = Math.max(rect.height - size, 0);
    var best = null;
    for (var attempt=0; attempt<12; attempt++){
      var x = rand(0, maxX);
      var y = rand(0, maxY);
      var ok = true;
      var children = bubbleField.children;
      for (var i=0;i<children.length;i++){
        var el = children[i];
        var ex = parseFloat(el.style.left) || 0;
        var ey = parseFloat(el.style.top) || 0;
        var ew = parseFloat(el.style.width) || 70;
        var ddx = ex - x, ddy = ey - y;
        var minDist = (size + ew) / 2 * 0.7;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < minDist){ ok = false; break; }
      }
      if (ok){ best = {x:x, y:y}; break; }
    }
    return best || {x: rand(0,maxX), y: rand(0,maxY)};
  }

  function createBubbleEl(bubble){
    var el = document.createElement("div");
    el.className = "bubble";
    el.dataset.id = bubble.id;
    var size = sizeForStep(bubble.stepIndex);
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.left = bubble.x + "px";
    el.style.top = bubble.y + "px";
    el.style.setProperty("--dur", (6 + Math.random()*4).toFixed(2) + "s");
    el.style.setProperty("--delay", (Math.random()*3).toFixed(2) + "s");
    el.style.setProperty("--dx1", rand(-14,14).toFixed(1) + "px");
    el.style.setProperty("--dy1", rand(-18,-6).toFixed(1) + "px");
    el.style.setProperty("--dx2", rand(-10,10).toFixed(1) + "px");
    el.style.setProperty("--dy2", rand(-10,10).toFixed(1) + "px");
    el.style.setProperty("--dx3", rand(-14,14).toFixed(1) + "px");
    el.style.setProperty("--dy3", rand(6,18).toFixed(1) + "px");
    el.style.setProperty("--r1", rand(-6,6).toFixed(1) + "deg");
    el.style.setProperty("--r2", rand(-6,6).toFixed(1) + "deg");

    var textEl = document.createElement("div");
    textEl.className = "bubble-text";
    textEl.textContent = bubble.text;

    var timeEl = document.createElement("div");
    timeEl.className = "bubble-time";
    timeEl.textContent = TIME_STEPS[bubble.stepIndex].label;

    el.appendChild(textEl);
    el.appendChild(timeEl);

    attachBubbleGestures(el, bubble, {
      onTap: function(){ popBubble(bubble.id); },
      onTimeChange: function(b){
        timeEl.textContent = TIME_STEPS[b.stepIndex].label;
        var newSize = sizeForStep(b.stepIndex);
        el.style.width = newSize + "px";
        el.style.height = newSize + "px";
      },
      onGestureEnd: function(){ saveState(); }
    });

    return el;
  }

  function renderAllBubbles(){
    bubbleField.innerHTML = "";
    state.bubbles.forEach(function(b){
      bubbleField.appendChild(createBubbleEl(b));
    });
  }

  function popBubble(id){
    var idx = -1;
    for (var i=0;i<state.bubbles.length;i++){
      if (state.bubbles[i].id === id){ idx = i; break; }
    }
    if (idx === -1) return;
    var bubble = state.bubbles[idx];
    playPopSound();
    var el = bubbleField.querySelector('[data-id="' + bubble.id + '"]');
    if (el){
      el.classList.add("popping");
      el.addEventListener("animationend", function handler(){
        if (el.parentNode) el.parentNode.removeChild(el);
        el.removeEventListener("animationend", handler);
      });
    }
    state.bubbles.splice(idx, 1);
    state.logs.push(toLogEntry(bubble, Date.now(), false));
    saveState();
  }

  /* ===================== 泡を実際に作る（OK／お気に入りチップ共通） ===================== */
  function spawnBubble(text, stepIndex){
    var size = sizeForStep(stepIndex);
    var pos = randomPosition(size);
    var bubble = {
      id: uid(),
      text: text,
      stepIndex: stepIndex,
      x: pos.x,
      y: pos.y,
      createdAt: Date.now()
    };
    state.bubbles.push(bubble);
    bubbleField.appendChild(createBubbleEl(bubble));
    saveState();
    return bubble;
  }

  /* ===================== お気に入り（ルーティン）チップ ===================== */
  function upsertFavorite(text, stepIndex){
    var existing = null;
    for (var i=0;i<state.favorites.length;i++){
      if (state.favorites[i].text === text){ existing = state.favorites[i]; break; }
    }
    if (existing){
      existing.stepIndex = stepIndex;
    } else {
      state.favorites.push({ id: uid(), text: text, stepIndex: stepIndex });
    }
    saveState();
    renderFavoriteChips();
  }
  function removeFavorite(id){
    state.favorites = state.favorites.filter(function(f){ return f.id !== id; });
    saveState();
    renderFavoriteChips();
  }
  /* チップは「タップ＝同じ内容の泡を作る」「長押し＝お気に入りから削除」 */
  function attachChipGestures(chip, fav){
    var timer = null, longPressed = false, startX = 0, startY = 0;
    function cancelTimer(){ if (timer){ clearTimeout(timer); timer = null; } }
    chip.addEventListener("pointerdown", function(e){
      longPressed = false;
      startX = e.clientX; startY = e.clientY;
      cancelTimer();
      timer = setTimeout(function(){
        longPressed = true;
        removeFavorite(fav.id);
      }, 550);
    });
    chip.addEventListener("pointermove", function(e){
      var dx = e.clientX - startX, dy = e.clientY - startY;
      if (Math.sqrt(dx*dx + dy*dy) > 10) cancelTimer();
    });
    chip.addEventListener("pointerup", function(){
      var wasLongPress = longPressed;
      cancelTimer();
      if (!wasLongPress){
        getAudioCtx();
        spawnBubble(fav.text, fav.stepIndex);
        textInput.blur();
      }
    });
    chip.addEventListener("pointercancel", cancelTimer);
  }
  function renderFavoriteChips(){
    favoriteChips.innerHTML = "";
    favoriteSection.classList.toggle("empty", state.favorites.length === 0);
    state.favorites.forEach(function(fav){
      var chip = document.createElement("button");
      chip.type = "button";
      chip.className = "fav-chip";
      var textSpan = document.createElement("span");
      textSpan.textContent = fav.text;
      var timeSpan = document.createElement("span");
      timeSpan.className = "fav-chip-time";
      timeSpan.textContent = TIME_STEPS[fav.stepIndex].label;
      chip.appendChild(textSpan);
      chip.appendChild(timeSpan);
      attachChipGestures(chip, fav);
      favoriteChips.appendChild(chip);
    });
  }

  /* ===================== 入力 ===================== */
  var prevLen = 0;
  textInput.addEventListener("input", function(){
    var len = textInput.value.length;
    if (len > prevLen) playTypeSound();
    prevLen = len;
  });
  textInput.addEventListener("focus", function(){
    getAudioCtx();
    cardStack.classList.add("kb-active");
  });
  textInput.addEventListener("blur", function(){
    cardStack.classList.remove("kb-active");
  });

  okBtn.addEventListener("click", function(){
    getAudioCtx();
    var text = textInput.value.trim();
    if (!text){ textInput.focus(); return; }
    var stepIndex = previewData.stepIndex;
    spawnBubble(text, stepIndex);
    if (previewData.isFavorite){
      upsertFavorite(text, stepIndex);
    }

    textInput.value = "";
    prevLen = 0;
    previewData.stepIndex = DEFAULT_STEP_INDEX;
    previewData.isFavorite = false;
    updatePreviewDisplay();
    updateFavToggleUI();
    textInput.blur();
  });

  textInput.addEventListener("keydown", function(e){
    if (e.key === "Enter"){ e.preventDefault(); okBtn.click(); }
  });

  /* ===================== 画面切り替え ===================== */
  function showLogScreen(){
    renderLogScreen();
    mainScreen.classList.remove("active");
    logScreen.classList.add("active");
  }
  function showMainScreen(){
    logScreen.classList.remove("active");
    mainScreen.classList.add("active");
  }
  logIconBtn.addEventListener("click", showLogScreen);
  backBtn.addEventListener("click", showMainScreen);

  function renderLogScreen(){
    var sorted = state.logs.slice().sort(function(a,b){ return b.archivedAt - a.archivedAt; });
    logList.innerHTML = "";
    if (sorted.length === 0){
      var empty = document.createElement("div");
      empty.className = "empty-log";
      empty.textContent = "まだログがありません";
      logList.appendChild(empty);
      return;
    }
    var lastHeader = "";
    sorted.forEach(function(entry){
      var d = new Date(entry.archivedAt);
      var dateStr = d.getFullYear() + "/" + pad(d.getMonth()+1) + "/" + pad(d.getDate());
      if (dateStr !== lastHeader){
        var header = document.createElement("div");
        header.className = "log-date-header";
        header.textContent = dateStr;
        logList.appendChild(header);
        lastHeader = dateStr;
      }
      var row = document.createElement("div");
      row.className = "log-row";
      var timeStr = pad(d.getHours()) + ":" + pad(d.getMinutes());
      row.innerHTML =
        '<span class="log-time">' + timeStr + '</span>' +
        '<span class="log-badge">' + escapeHtml(entry.timeLabel) + '</span>' +
        '<span class="log-text">' + escapeHtml(entry.text) + '</span>' +
        (entry.autoCleared ? '<span class="log-auto">自動</span>' : '');
      logList.appendChild(row);
    });
  }

  /* ===================== CSV出力 ===================== */
  function escapeCsv(field){
    var s = String(field);
    if (/[",\r\n]/.test(s)){
      return '"' + s.replace(/"/g,'""') + '"';
    }
    return s;
  }
  function downloadCSV(){
    var rows = [["日付","目安時間","内容"]];
    var sorted = state.logs.slice().sort(function(a,b){ return b.archivedAt - a.archivedAt; });
    sorted.forEach(function(l){
      rows.push([formatDateTime(l.archivedAt), l.timeLabel, l.text]);
    });
    var csv = rows.map(function(r){ return r.map(escapeCsv).join(","); }).join("\r\n");
    var blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var now = new Date();
    a.href = url;
    a.download = "bubble_log_" + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }
  csvBtn.addEventListener("click", downloadCSV);

  /* ===================== 深夜3時の自動リセット ===================== */
  function checkAutoReset(){
    var logicalDate = getLogicalDateStr();
    if (state.lastResetDate !== logicalDate){
      var archivedAt = Date.now();
      state.bubbles.forEach(function(b){
        state.logs.push(toLogEntry(b, archivedAt, true));
      });
      state.bubbles = [];
      state.lastResetDate = logicalDate;
      saveState();
      renderAllBubbles();
    }
  }

  /* ===================== 初期化 ===================== */
  function init(){
    checkAutoReset();
    renderAllBubbles();
    renderFavoriteChips();
    setInterval(checkAutoReset, 30000);
    document.addEventListener("visibilitychange", function(){
      if (!document.hidden) checkAutoReset();
    });
    window.addEventListener("resize", function(){
      /* 画面サイズが変わると「24時間＝画面いっぱい」の基準も変わるため、
         既存の泡のサイズと位置を再計算する */
      var rect = bubbleField.getBoundingClientRect();
      state.bubbles.forEach(function(b){
        var size = sizeForStep(b.stepIndex);
        b.x = clamp(b.x, 0, Math.max(rect.width - size, 0));
        b.y = clamp(b.y, 0, Math.max(rect.height - size, 0));
        var el = bubbleField.querySelector('[data-id="' + b.id + '"]');
        if (el){
          el.style.width = size + "px";
          el.style.height = size + "px";
          el.style.left = b.x + "px";
          el.style.top = b.y + "px";
        }
      });
      saveState();
      updatePreviewDisplay();
    });
  }

  init();
})();
</script>
